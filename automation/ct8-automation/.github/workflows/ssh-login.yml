name: SSH Login

on:
  workflow_dispatch:
    inputs:
      command:
        description: Command to execute after successful SSH login
        required: false
        default: uname -a

permissions:
  contents: read

jobs:
  ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Validate auth inputs
        env:
          HAS_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          HAS_USER: ${{ secrets.SSH_USER }}
          HAS_HOST: ${{ secrets.SSH_HOST }}
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          USERS_LIST: ${{ secrets.USERS_LIST }}
        shell: bash
        run: |
          if [ -z "$HAS_HOST" ]; then echo "::error::缺少 SSH_HOST" && exit 1; fi
          if [ -z "$HAS_PASSWORD" ]; then echo "::error::缺少 SSH_PASSWORD" && exit 1; fi
          # 当既没有 ACCOUNTS_JSON 也没有 USERS_LIST 时，要求提供单账号 SSH_USER
          if [ -z "$ACCOUNTS_JSON" ] && [ -z "$USERS_LIST" ]; then
            if [ -z "$HAS_USER" ]; then echo "::error::缺少 SSH_USER（未提供 USERS_LIST/ACCOUNTS_JSON）" && exit 1; fi
          fi

      - name: Detect inputs
        id: detect
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          USERS_LIST: ${{ secrets.USERS_LIST }}
        shell: bash
        run: |
          if [ -n "$(printf "%s" "$ACCOUNTS_JSON" | tr -d '\n' | sed 's/\s//g')" ]; then
            echo "has_accounts_json=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_accounts_json=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$(printf "%s" "$USERS_LIST" | tr -d '\n' | sed 's/\s//g')" ]; then
            echo "has_users_list=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_users_list=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pick rotating proxy (optional)
        id: pick_proxy
        env:
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
        shell: bash
        run: |
          set -euo pipefail
          # 读取多行代理，忽略空行和以#开头的注释
          mapfile -t proxies < <(printf "%s\n" "$PROXY_LIST" | sed -e 's/^\s\+//;s/\s\+$//' -e '/^#/d;/^$/d')
          if [ ${#proxies[@]} -eq 0 ]; then
            echo "has_proxy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          idx=$((RANDOM % ${#proxies[@]}))
          chosen="${proxies[$idx]}"
          # 支持格式：socks5://user:pass@host:port  或  http://host:port
          proto="${chosen%%://*}"; rest="${chosen#*://}"
          if [[ "$rest" == *"@"* ]]; then
            auth="${rest%%@*}"; hostport="${rest#*@}"
          else
            auth=""; hostport="$rest"
          fi
          host="${hostport%:*}"; port="${hostport##*:}"
          echo "has_proxy=true" >> "$GITHUB_OUTPUT"
          echo "proxy_type=$proto" >> "$GITHUB_OUTPUT"
          echo "proxy_host=$host" >> "$GITHUB_OUTPUT"
          echo "proxy_port=$port" >> "$GITHUB_OUTPUT"
          echo "proxy_auth=$auth" >> "$GITHUB_OUTPUT"
          echo "选用代理: $proto://$([ -n "$auth" ] && printf '%s@' "$auth")$host:$port"

      - name: Start Tor (free rotating IP)
        id: tor
        shell: bash
        run: |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends tor netcat-openbsd
          cat > torrc << 'EOF'
          SocksPort 9050 IsolateSOCKSAuth
          ControlPort 9051
          CookieAuthentication 0
          MaxCircuitDirtiness 300
          Log notice stdout
          EOF
          nohup tor -f torrc >/tmp/tor.log 2>&1 &
          # 等待SOCKS端口就绪（最多 20s）
          for i in {1..20}; do nc -z 127.0.0.1 9050 && break; sleep 1; done
          # 请求新电路以增加换出口几率
          echo -e "AUTHENTICATE \"\"\r\nSIGNAL NEWNYM\r\nQUIT\r\n" | nc 127.0.0.1 9051 || true
          echo "has_tor=true" >> "$GITHUB_OUTPUT"

      - name: Init results file
        shell: bash
        run: |
          echo "[]" > /tmp/ssh_results.json
          : > /tmp/ssh_results.ndjson

      - name: Prepare known_hosts (single/multi-user)
        if: ${{ steps.detect.outputs.has_accounts_json != 'true' }}
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        shell: bash
        run: |
          if [ -z "$SSH_HOST" ]; then
            echo "::error::Missing secret SSH_HOST" && exit 1
          fi
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts

      - name: SSH multiple accounts with unique IPs
        if: ${{ steps.detect.outputs.has_accounts_json == 'true' }}
        shell: bash
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          RUN_CMD: ${{ inputs.command }}
          HAS_TOR: ${{ steps.tor.outputs.has_tor }}
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq curl sshpass openssh-client ncat

          # 解析账户
          echo "$ACCOUNTS_JSON" | jq -e . >/dev/null 2>&1 || { echo "::error::ACCOUNTS_JSON 不是合法 JSON"; exit 1; }
          total=$(echo "$ACCOUNTS_JSON" | jq 'length')
          echo "共 ${total} 个账号，逐个登录并保证出口 IP 不重复"

          # 准备代理池（可选）
          mapfile -t proxy_lines < <(printf "%s\n" "${PROXY_LIST:-}" | sed -e 's/^\s\+//;s/\s\+$//' -e '/^#/d;/^$/d')
          used_ips=()

          get_public_ip() {
            local proxy="$1"; local token="${2:-}"; local ip=""
            if [ "$proxy" = "tor" ]; then
              if [ -n "$token" ]; then
                ip=$(curl -sS --max-time 20 --proxy-user "$token:x" --socks5-hostname 127.0.0.1:9050 https://api.ipify.org || true)
              else
                ip=$(curl -sS --max-time 20 --socks5-hostname 127.0.0.1:9050 https://api.ipify.org || true)
              fi
            elif [ -n "$proxy" ]; then
              # proxy 形如 protocol://[user:pass@]host:port
              ip=$(curl -sS --max-time 15 -x "$proxy" https://api.ipify.org || true)
            else
              ip=$(curl -sS --max-time 10 https://api.ipify.org || true)
            fi
            printf '%s' "$ip"
          }

          contains_ip() { local x="$1"; shift; for v in "$@"; do [ "$v" = "$x" ] && return 0; done; return 1; }

          pick_proxy_for_index() {
            local idx="$1"; local chosen="";
            if [ "${HAS_TOR:-false}" = "true" ]; then
              chosen="tor"
            elif [ ${#proxy_lines[@]} -gt 0 ]; then
              # 简单轮询
              chosen="${proxy_lines[$((idx % ${#proxy_lines[@]}))]}"
            else
              chosen=""
            fi
            printf '%s' "$chosen"
          }

          append_result() {
            local ok="$1"; local msg="$2"; local obj tmp
            obj=$(printf '{"host":"%s","user":"%s","port":%s,"out_ip":"%s","proxy":"%s","success":%s,"time":%s,"expiry_text":"%s","expiry_unix":%s}\n' "$host" "$user" "$port" "${out_ip:-}" "${chosen_proxy:-}" "$ok" "$(date +%s)" "${expiry_text:-}" "${expiry_unix_json:-null}")
            tmp=$(mktemp)
            jq ". + [${obj}]" /tmp/ssh_results.json > "$tmp" && mv "$tmp" /tmp/ssh_results.json || true
          }

          for i in $(seq 0 $((total-1))); do
            host=$(echo "$ACCOUNTS_JSON" | jq -r ".[$i].host")
            user=$(echo "$ACCOUNTS_JSON" | jq -r ".[$i].user")
            password=$(echo "$ACCOUNTS_JSON" | jq -r ".[$i].password")
            port=$(echo "$ACCOUNTS_JSON" | jq -r ".[$i].port // 22")

            # known_hosts
            mkdir -p ~/.ssh
            ssh-keyscan -p "$port" "$host" >> ~/.ssh/known_hosts 2>/dev/null || true
            chmod 600 ~/.ssh/known_hosts

            # 选择代理并确保出口 IP 不与已用重复
            chosen_proxy=$(pick_proxy_for_index "$i")
            tor_token=""
            if [ "$chosen_proxy" = "tor" ]; then
              tor_token="user$(date +%s%N)$RANDOM"
            fi

            attempts=0
            while true; do
              attempts=$((attempts+1))
              if [ "$chosen_proxy" = "tor" ]; then
                echo -e "AUTHENTICATE \"\"\r\nSIGNAL NEWNYM\r\nQUIT\r\n" | nc 127.0.0.1 9051 >/dev/null 2>&1 || true
              fi
              out_ip=$(get_public_ip "$chosen_proxy" "$tor_token")
              if [ -n "$out_ip" ] && ! contains_ip "$out_ip" "${used_ips[@]}"; then
                used_ips+=("$out_ip")
                ipify_ip="$out_ip"
                echo "账号 #$((i+1)) 预检测出口 IP(ipify): $ipify_ip (proxy=${chosen_proxy:-direct})"
                break
              fi
              if [ $attempts -ge 10 ]; then
                echo "::warning::无法获得新出口 IP，使用当前可用代理继续"
                break
              fi
              sleep 2
            done

            # 构建 ProxyCommand
            PROXY_OPT=()
            if [ "$chosen_proxy" = "tor" ]; then
              PROXY_OPT=(-o "ProxyCommand=ncat --proxy-type socks5 --proxy 127.0.0.1:9050 --proxy-auth ${tor_token}:x %h %p")
            elif [ -n "$chosen_proxy" ]; then
              proto="${chosen_proxy%%://*}"; rest="${chosen_proxy#*://}"
              if [[ "$rest" == *"@"* ]]; then auth="${rest%%@*}"; hostport="${rest#*@}"; else auth=""; hostport="$rest"; fi
              phost="${hostport%:*}"; pport="${hostport##*:}"
              cmd="ncat --proxy-type ${proto} --proxy ${phost}:${pport}"
              if [ -n "$auth" ]; then cmd+=" --proxy-auth ${auth}"; fi
              PROXY_OPT=(-o "ProxyCommand=${cmd} %h %p")
            fi

            echo "开始登录: ${user}@${host}:${port}"
            tmp_ssh=$(mktemp)
            set +e
            # 单次会话：通过交互PTY获取横幅，再执行命令（用分组 + echo 管道避免 heredoc 缩进问题）
            { \
              echo "echo __REMOTE_IP__=\$(echo \$SSH_CONNECTION | awk '{print \$1}')"; \
              echo "${RUN_CMD}"; \
              echo "exit"; \
            } | sshpass -p "$password" \
              ssh -vvv -tt "${PROXY_OPT[@]}" \
              -o PreferredAuthentications=keyboard-interactive,password \
              -o NumberOfPasswordPrompts=1 \
              -o PubkeyAuthentication=no \
              -o KbdInteractiveAuthentication=yes \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -p "$port" "$user@$host" 2>&1 | tee "$tmp_ssh"
            ec=${PIPESTATUS[1]}
            set -e
            remote_ip=$(grep -oE '__REMOTE_IP__=[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' "$tmp_ssh" | tail -n1 | cut -d= -f2 || true)
            if [ -n "${remote_ip:-}" ]; then echo "服务器实测出口 IP: $remote_ip"; out_ip="$remote_ip"; fi
            # 提取账号到期时间（如：Konto ważne do: 2026-01-15 08:40:59）
            tmp_clean=$(mktemp)
            # 去除 ANSI 颜色与回车符，便于匹配
            perl -pe 's/\e\[[\d;]*[A-Za-z]//g' "$tmp_ssh" | sed -E 's/\r//g' > "$tmp_clean"
            expiry_text=$(grep -E -i 'Konto|ważne|wygasa|expires|valid|expiry' "$tmp_clean" | grep -Eo '[0-9]{4}[-./][0-9]{2}[-./][0-9]{2}([ T][0-9]{2}:[0-9]{2}(:[0-9]{2})?)?' | tail -n1 || true)
            if [ -z "${expiry_text:-}" ]; then expiry_text=$(perl -ne 'if(/Konto[^\n]*?:\s*([0-9]{4}[-./][0-9]{2}[-./][0-9]{2}[ T][0-9]{2}:[0-9]{2}(?::[0-9]{2})?)/){print "$1\n";exit}' "$tmp_clean" 2>/dev/null || true); fi
            # 不再进行第二次短连，避免产生重复登录记录
            if [ -n "${expiry_text:-}" ]; then expiry_unix=$(date -d "$expiry_text" +%s 2>/dev/null || true); else expiry_unix=""; fi
            if [ -n "${expiry_unix:-}" ]; then expiry_unix_json="$expiry_unix"; else expiry_unix_json="null"; fi
            if [ $ec -eq 0 ]; then append_result true ""; else append_result false ""; fi
            # 追加 NDJSON 行
            printf '{"host":"%s","user":"%s","port":%s,"ipify_ip":"%s","out_ip":"%s","proxy":"%s","success":%s,"time":%s,"expiry_text":"%s","expiry_unix":%s}\n' "$host" "$user" "$port" "${ipify_ip:-}" "${out_ip:-}" "${chosen_proxy:-}" "$([ $ec -eq 0 ] && echo true || echo false)" "$(date +%s)" "${expiry_text:-}" "${expiry_unix_json:-null}" >> /tmp/ssh_results.ndjson || true
          done

      - name: SSH multi users (same host/password) with unique IPs
        if: ${{ steps.detect.outputs.has_accounts_json != 'true' && steps.detect.outputs.has_users_list == 'true' }}
        shell: bash
        env:
          USERS_LIST: ${{ secrets.USERS_LIST }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          RUN_CMD: ${{ inputs.command }}
          HAS_TOR: ${{ steps.tor.outputs.has_tor }}
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y curl sshpass openssh-client ncat

          # 用户名列表（逗号或换行分隔）
          mapfile -t users < <(printf "%s\n" "$USERS_LIST" | sed -e 's/^\s\+//;s/\s\+$//' -e 's/,/\n/g' -e '/^$/d')
          echo "共 ${#users[@]} 个用户名"

          mapfile -t proxy_lines < <(printf "%s\n" "${PROXY_LIST:-}" | sed -e 's/^\s\+//;s/\s\+$//' -e '/^#/d;/^$/d')
          used_ips=()

          get_public_ip() {
            local proxy="$1"; local token="${2:-}"; local ip=""
            if [ "$proxy" = "tor" ]; then
              if [ -n "$token" ]; then
                ip=$(curl -sS --max-time 20 --proxy-user "$token:x" --socks5-hostname 127.0.0.1:9050 https://api.ipify.org || true)
              else
                ip=$(curl -sS --max-time 20 --socks5-hostname 127.0.0.1:9050 https://api.ipify.org || true)
              fi
            elif [ -n "$proxy" ]; then
              ip=$(curl -sS --max-time 15 -x "$proxy" https://api.ipify.org || true)
            else
              ip=$(curl -sS --max-time 10 https://api.ipify.org || true)
            fi
            printf '%s' "$ip"
          }
          contains_ip() { local x="$1"; shift; for v in "$@"; do [ "$v" = "$x" ] && return 0; done; return 1; }
          pick_proxy_for_index() {
            local idx="$1"; local chosen="";
            if [ "${HAS_TOR:-false}" = "true" ]; then
              chosen="tor"
            elif [ ${#proxy_lines[@]} -gt 0 ]; then
              chosen="${proxy_lines[$((idx % ${#proxy_lines[@]}))]}"
            else
              chosen=""
            fi
            printf '%s' "$chosen"
          }

          append_result() {
            local ok="$1"; local msg="$2"; local obj tmp
            obj=$(printf '{"host":"%s","user":"%s","port":%s,"out_ip":"%s","proxy":"%s","success":%s,"time":%s,"expiry_text":"%s","expiry_unix":%s}\n' "$host" "$user" "$port" "${out_ip:-}" "${chosen_proxy:-}" "$ok" "$(date +%s)" "${expiry_text:-}" "${expiry_unix_json:-null}")
            tmp=$(mktemp)
            jq ". + [${obj}]" /tmp/ssh_results.json > "$tmp" && mv "$tmp" /tmp/ssh_results.json || true
          }

          for i in "${!users[@]}"; do
            user="${users[$i]}"
            host="$SSH_HOST"; port="${SSH_PORT:-22}"; password="$SSH_PASSWORD"

            # 选择代理并确保出口 IP 不重复
            chosen_proxy=$(pick_proxy_for_index "$i")
            tor_token=""
            if [ "$chosen_proxy" = "tor" ]; then
              tor_token="user$(date +%s%N)$RANDOM"
            fi

            attempts=0
            while true; do
              attempts=$((attempts+1))
              if [ "$chosen_proxy" = "tor" ]; then
                echo -e "AUTHENTICATE \"\"\r\nSIGNAL NEWNYM\r\nQUIT\r\n" | nc 127.0.0.1 9051 >/dev/null 2>&1 || true
              fi
              out_ip=$(get_public_ip "$chosen_proxy" "$tor_token")
              if [ -n "$out_ip" ] && ! contains_ip "$out_ip" "${used_ips[@]}"; then
                used_ips+=("$out_ip")
                ipify_ip="$out_ip"
                echo "用户(${user}) 预检测出口 IP(ipify): $ipify_ip (proxy=${chosen_proxy:-direct})"
                break
              fi
              if [ $attempts -ge 10 ]; then
                echo "::warning::无法获得新出口 IP，使用当前可用代理继续"
                break
              fi
              sleep 2
            done

            # 构建 ProxyCommand
            PROXY_OPT=()
            if [ "$chosen_proxy" = "tor" ]; then
              PROXY_OPT=(-o "ProxyCommand=ncat --proxy-type socks5 --proxy 127.0.0.1:9050 --proxy-auth ${tor_token}:x %h %p")
            elif [ -n "$chosen_proxy" ]; then
              proto="${chosen_proxy%%://*}"; rest="${chosen_proxy#*://}"
              if [[ "$rest" == *"@"* ]]; then auth="${rest%%@*}"; hostport="${rest#*@}"; else auth=""; hostport="$rest"; fi
              phost="${hostport%:*}"; pport="${hostport##*:}"
              cmd="ncat --proxy-type ${proto} --proxy ${phost}:${pport}"
              if [ -n "$auth" ]; then cmd+=" --proxy-auth ${auth}"; fi
              PROXY_OPT=(-o "ProxyCommand=${cmd} %h %p")
            fi

            echo "开始登录: ${user}@${host}:${port}"
            tmp_ssh=$(mktemp)
            set +e
            { \
              echo "echo __REMOTE_IP__=\$(echo \$SSH_CONNECTION | awk '{print \$1}')"; \
              echo "${RUN_CMD}"; \
              echo "exit"; \
            } | sshpass -p "$password" \
              ssh -vvv -tt "${PROXY_OPT[@]}" \
              -o PreferredAuthentications=keyboard-interactive,password \
              -o NumberOfPasswordPrompts=1 \
              -o PubkeyAuthentication=no \
              -o KbdInteractiveAuthentication=yes \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -p "$port" "$user@$host" 2>&1 | tee "$tmp_ssh"
            ec=${PIPESTATUS[1]}
            set -e
            remote_ip=$(grep -oE '__REMOTE_IP__=[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' "$tmp_ssh" | tail -n1 | cut -d= -f2 || true)
            if [ -n "${remote_ip:-}" ]; then echo "服务器实测出口 IP: $remote_ip"; out_ip="$remote_ip"; fi
            # 提取账号到期时间
            tmp_clean=$(mktemp)
            perl -pe 's/\e\[[\d;]*[A-Za-z]//g' "$tmp_ssh" | sed -E 's/\r//g' > "$tmp_clean"
            expiry_text=$(grep -E -i 'Konto|ważne|wygasa|expires|valid|expiry' "$tmp_clean" | grep -Eo '[0-9]{4}[-./][0-9]{2}[-./][0-9]{2}([ T][0-9]{2}:[0-9]{2}(:[0-9]{2})?)?' | tail -n1 || true)
            if [ -z "${expiry_text:-}" ]; then expiry_text=$(perl -ne 'if(/Konto[^\n]*?:\s*([0-9]{4}[-./][0-9]{2}[-./][0-9]{2}[ T][0-9]{2}:[0-9]{2}(?::[0-9]{2})?)/){print "$1\n";exit}' "$tmp_clean" 2>/dev/null || true); fi
            # 不再进行第二次短连，避免产生重复登录记录
            if [ -n "${expiry_text:-}" ]; then expiry_unix=$(date -d "$expiry_text" +%s 2>/dev/null || true); else expiry_unix=""; fi
            if [ -n "${expiry_unix:-}" ]; then expiry_unix_json="$expiry_unix"; else expiry_unix_json="null"; fi
            if [ $ec -eq 0 ]; then append_result true ""; else append_result false ""; fi
            printf '{"host":"%s","user":"%s","port":%s,"ipify_ip":"%s","out_ip":"%s","proxy":"%s","success":%s,"time":%s,"expiry_text":"%s","expiry_unix":%s}\n' "$host" "$user" "$port" "${ipify_ip:-}" "${out_ip:-}" "${chosen_proxy:-}" "$([ $ec -eq 0 ] && echo true || echo false)" "$(date +%s)" "${expiry_text:-}" "${expiry_unix_json:-null}" >> /tmp/ssh_results.ndjson || true
          done

      - name: SSH via sshpass (password only)
        if: ${{ steps.detect.outputs.has_accounts_json != 'true' && steps.detect.outputs.has_users_list != 'true' }}
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          RUN_CMD: ${{ inputs.command }}
          HAS_PROXY: ${{ steps.pick_proxy.outputs.has_proxy }}
          PROXY_TYPE: ${{ steps.pick_proxy.outputs.proxy_type }}
          PROXY_HOST: ${{ steps.pick_proxy.outputs.proxy_host }}
          PROXY_PORT: ${{ steps.pick_proxy.outputs.proxy_port }}
          PROXY_AUTH: ${{ steps.pick_proxy.outputs.proxy_auth }}
          HAS_TOR: ${{ steps.tor.outputs.has_tor }}
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo apt-get install -y sshpass openssh-client ncat curl jq
          echo "尝试使用密码方式连接 $SSH_USER@$SSH_HOST:${SSH_PORT:-22} 并执行: $RUN_CMD"
          TOR_TOKEN=""
          if [ "${HAS_TOR:-false}" = "true" ]; then TOR_TOKEN="user$(date +%s%N)$RANDOM"; fi

          # 构建代理参数（使用 ncat 提供 proxy 支持）
          PROXY_OPT=()
          if [ "${HAS_TOR:-false}" = "true" ]; then
            PROXY_OPT=(-o "ProxyCommand=ncat --proxy-type socks5 --proxy 127.0.0.1:9050 --proxy-auth ${TOR_TOKEN}:x %h %p")
          elif [ "${HAS_PROXY:-false}" = "true" ]; then
            cmd="ncat --proxy-type ${PROXY_TYPE} --proxy ${PROXY_HOST}:${PROXY_PORT}"
            if [ -n "${PROXY_AUTH}" ]; then cmd+=" --proxy-auth ${PROXY_AUTH}"; fi
            PROXY_OPT=(-o "ProxyCommand=${cmd} %h %p")
          fi
          # 计算出口 IP（用于结果展示）
          get_public_ip() {
            local ip=""
            if [ "${HAS_TOR:-false}" = "true" ]; then
              ip=$(curl -sS --max-time 20 --proxy-user "${TOR_TOKEN}:x" --socks5-hostname 127.0.0.1:9050 https://api.ipify.org || true)
            elif [ "${HAS_PROXY:-false}" = "true" ]; then
              local proxy="${PROXY_TYPE}://${PROXY_HOST}:${PROXY_PORT}"
              if [ -n "${PROXY_AUTH}" ]; then proxy="${PROXY_TYPE}://${PROXY_AUTH}@${PROXY_HOST}:${PROXY_PORT}"; fi
              ip=$(curl -sS --max-time 15 -x "$proxy" https://api.ipify.org || true)
            else
              ip=$(curl -sS --max-time 10 https://api.ipify.org || true)
            fi
            printf '%s' "$ip"
          }
          out_ip=$(get_public_ip)
          if [ "${HAS_TOR:-false}" = "true" ]; then chosen_proxy="tor"; elif [ "${HAS_PROXY:-false}" = "true" ]; then chosen_proxy="${PROXY_TYPE}://${PROXY_HOST}:${PROXY_PORT}"; else chosen_proxy=""; fi
          ipify_ip="$out_ip"
          echo "预检测出口 IP(ipify): $ipify_ip (proxy=${chosen_proxy:-direct})"

          tmp_ssh=$(mktemp)
          set +e
          { \
            echo "echo __REMOTE_IP__=\$(echo \$SSH_CONNECTION | awk '{print \$1}')"; \
            echo "${RUN_CMD}"; \
            echo "exit"; \
          } | sshpass -p "$SSH_PASSWORD" \
            ssh -vvv -tt "${PROXY_OPT[@]}" \
            -o PreferredAuthentications=keyboard-interactive,password \
            -o NumberOfPasswordPrompts=1 \
            -o PubkeyAuthentication=no \
            -o KbdInteractiveAuthentication=yes \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" 2>&1 | tee "$tmp_ssh"
          ec=${PIPESTATUS[1]}
          set -e
          remote_ip=$(grep -oE '__REMOTE_IP__=[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' "$tmp_ssh" | tail -n1 | cut -d= -f2 || true)
          if [ -n "${remote_ip:-}" ]; then echo "服务器实测出口 IP: $remote_ip"; out_ip="$remote_ip"; fi
          # 提取账号到期时间
          tmp_clean=$(mktemp)
          perl -pe 's/\e\[[\d;]*[A-Za-z]//g' "$tmp_ssh" | sed -E 's/\r//g' > "$tmp_clean"
          expiry_text=$(grep -E -i 'Konto|ważne|wygasa|expires|valid|expiry' "$tmp_clean" | grep -Eo '[0-9]{4}[-./][0-9]{2}[-./][0-9]{2}([ T][0-9]{2}:[0-9]{2}(:[0-9]{2})?)?' | tail -n1 || true)
          if [ -z "${expiry_text:-}" ]; then expiry_text=$(perl -ne 'if(/Konto[^\n]*?:\s*([0-9]{4}[-./][0-9]{2}[-./][0-9]{2}[ T][0-9]{2}:[0-9]{2}(?::[0-9]{2})?)/){print "$1\n";exit}' "$tmp_clean" 2>/dev/null || true); fi
          # 不再进行第二次短连，避免产生重复登录记录
          if [ -n "${expiry_text:-}" ]; then expiry_unix=$(date -d "$expiry_text" +%s 2>/dev/null || true); else expiry_unix=""; fi
          if [ -n "${expiry_unix:-}" ]; then expiry_unix_json="$expiry_unix"; else expiry_unix_json="null"; fi
          tmp=$(mktemp)
          jq ". + [{\"host\":\"$SSH_HOST\",\"user\":\"$SSH_USER\",\"port\":${SSH_PORT:-22},\"out_ip\":\"$out_ip\",\"proxy\":\"$chosen_proxy\",\"success\":$([ $ec -eq 0 ] && echo true || echo false),\"time\":$(date +%s),\"expiry_text\":\"${expiry_text:-}\",\"expiry_unix\":${expiry_unix_json:-null}}]" /tmp/ssh_results.json > "$tmp" && mv "$tmp" /tmp/ssh_results.json || true
          printf '{"host":"%s","user":"%s","port":%s,"ipify_ip":"%s","out_ip":"%s","proxy":"%s","success":%s,"time":%s,"expiry_text":"%s","expiry_unix":%s}\n' "$SSH_HOST" "$SSH_USER" "${SSH_PORT:-22}" "${ipify_ip:-}" "${out_ip:-}" "${chosen_proxy:-}" "$([ $ec -eq 0 ] && echo true || echo false)" "$(date +%s)" "${expiry_text:-}" "${expiry_unix_json:-null}" >> /tmp/ssh_results.ndjson || true

      - name: Post results to callback (JSON)
        if: always()
        env:
          CALLBACK_URL: ${{ secrets.RESULT_CALLBACK_URL }}
          CALLBACK_AUTH: ${{ secrets.RESULT_CALLBACK_AUTH }}
          EMAS_SPACE_SECRET_HEADER: ${{ secrets.EMAS_SPACE_SECRET_HEADER }}
          EMAS_SPACE_SECRET: ${{ secrets.EMAS_SPACE_SECRET }}
        shell: bash
        run: |
          if [ -z "$CALLBACK_URL" ]; then echo "No callback url"; exit 0; fi
          if [ ! -s /tmp/ssh_results.json ]; then echo "No JSON results"; exit 0; fi
          RUN_ID="${GITHUB_RUN_ID}"; WORKFLOW="${GITHUB_WORKFLOW}"
          # 组装 application/json payload：{ run_id, workflow, results: [ ... ] }
          jq -n --arg run_id "$RUN_ID" --arg workflow "$WORKFLOW" --slurpfile arr /tmp/ssh_results.json '{run_id:$run_id, workflow:$workflow, results:$arr[0]}' > /tmp/ssh_payload.json
          CURL_ARGS=( -sS -X POST "$CALLBACK_URL" -H "Content-Type: application/json" --data-binary @/tmp/ssh_payload.json )
          if [ -n "$CALLBACK_AUTH" ]; then CURL_ARGS+=( -H "X-Auth: $CALLBACK_AUTH" ); fi
          if [ -n "$EMAS_SPACE_SECRET" ]; then header_name="${EMAS_SPACE_SECRET_HEADER:-X-Space-Secret}"; CURL_ARGS+=( -H "$header_name: $EMAS_SPACE_SECRET" ); fi
          curl "${CURL_ARGS[@]}" || true

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ssh_results
          path: /tmp/ssh_results.json
          if-no-files-found: ignore
          retention-days: 7
