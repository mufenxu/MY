name: Build and push Aliyun ACR images

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - backup-runner.Dockerfile
      - deployment-runner.Dockerfile
      - core-api.Dockerfile
      - exam-api.Dockerfile
      - notification-service.Dockerfile
      - campus-service.Dockerfile
      - iot-service.Dockerfile
      - apps/admin-console/**
      - apps/core-admin/**
      - apps/exam-admin/**
      - config/platform.services.docker.json
      - packages/platform-auth/**
      - services/platform-api/**
      - services/core-api/**
      - services/exam-api/**
      - services/notification-service/**
      - services/campus-service/**
      - services/iot-service/**
      - scripts/backup-runner.mjs
      - scripts/backup-mongodb-container.mjs
      - scripts/restore-mongodb-container.mjs
      - scripts/deployment-runner.mjs
      - scripts/configure-deployment-sidecar.mjs
      - infra/docker/compose.yml
      - infra/docker/mongodb.Dockerfile
      - infra/docker/mongodb-entrypoint.sh
      - infra/docker/mongo-init.sh
      - infra/docker/ensure-users.js
      - scripts/buildx-metadata.mjs
      - .github/workflows/aliyun-acr.yml
  workflow_dispatch:
    inputs:
      targets:
        description: "Images to build: platform,backup,runner,core,exam,notification,campus,iot,mongodb,all"
        required: true
        default: "platform,backup"
      push_sha_tags:
        description: "Required safety control: publish immutable tags suffixed with the short commit SHA"
        required: true
        type: boolean
        default: true
      release_id:
        description: "Release center correlation id (normally supplied by the platform)"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

concurrency:
  group: aliyun-acr-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.targets || 'auto' }}
  cancel-in-progress: false

env:
  ACR_REGISTRY: crpi-ijf5w3rczq2vwnig.cn-beijing.personal.cr.aliyuncs.com
  ACR_IMAGE: crpi-ijf5w3rczq2vwnig.cn-beijing.personal.cr.aliyuncs.com/mufenxu/my

jobs:
  build-and-push:
    name: Build selected ACR images
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Verify protected release branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Manual image promotion is restricted to main." >&2
            exit 1
          fi

      - name: Verify this commit passed required CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&per_page=20"
          for attempt in $(seq 1 90); do
            payload="$(curl --fail --silent --show-error \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api}")"
            conclusion="$(printf '%s' "${payload}" | jq -r '[.workflow_runs[] | select(.event == "push" or .event == "workflow_dispatch")][0].conclusion // ""')"
            status="$(printf '%s' "${payload}" | jq -r '[.workflow_runs[] | select(.event == "push" or .event == "workflow_dispatch")][0].status // ""')"
            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" != "success" ]; then
                echo "Required CI completed with conclusion: ${conclusion}" >&2
                exit 1
              fi
              echo "Required CI passed for ${GITHUB_SHA}."
              exit 0
            fi
            echo "Waiting for required CI for ${GITHUB_SHA} (${attempt}/90)..."
            sleep 30
          done
          echo "Timed out waiting for required CI for ${GITHUB_SHA}." >&2
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Resolve image targets
        id: resolve
        env:
          RAW_TARGETS_INPUT: ${{ github.event.inputs.targets }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          add_target() {
            local candidate="$1"
            for selected in "${targets[@]:-}"; do
              if [ "${selected}" = "${candidate}" ]; then
                return
              fi
            done
            targets+=("${candidate}")
          }

          targets=()
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            raw_targets="${RAW_TARGETS_INPUT:-platform,backup}"
            IFS=',' read -ra requested <<< "${raw_targets}"
            for item in "${requested[@]}"; do
              target="$(printf '%s' "${item}" | tr '[:upper:]' '[:lower:]' | xargs)"
              [ -z "${target}" ] && continue
              if [ "${target}" = "all" ]; then
                targets=(platform core exam notification backup runner campus iot mongodb)
                break
              fi
              case "${target}" in
                platform-api) target="platform" ;;
                core-api) target="core" ;;
                exam-api) target="exam" ;;
                notification-service) target="notification" ;;
                backup-runner) target="backup" ;;
                deployment-runner) target="runner" ;;
                campus-service) target="campus" ;;
                iot-service) target="iot" ;;
                mongo) target="mongodb" ;;
              esac
              add_target "${target}"
            done
          else
            if [ -n "${PUSH_BEFORE}" ] && [ "${PUSH_BEFORE}" != "0000000000000000000000000000000000000000" ]; then
              git diff --name-only "${PUSH_BEFORE}" "${GITHUB_SHA}" > changed-files.txt
            else
              git show --name-only --format= "${GITHUB_SHA}" > changed-files.txt
            fi

            while IFS= read -r file; do
              case "${file}" in
                .github/workflows/aliyun-acr.yml|scripts/buildx-metadata.mjs)
                  targets=(platform core exam notification backup runner campus iot mongodb)
                  ;;
              esac
              case "${file}" in
                Dockerfile|apps/admin-console/*|config/platform.services.docker.json|services/platform-api/*)
                  add_target platform
                  ;;
              esac
              case "${file}" in
                backup-runner.Dockerfile|scripts/backup-runner.mjs|scripts/backup-mongodb-container.mjs|scripts/restore-mongodb-container.mjs)
                  add_target backup
                  ;;
                apps/admin-console/package.json|apps/admin-console/src/backups.js)
                  add_target backup
                  ;;
              esac
              case "${file}" in
                deployment-runner.Dockerfile|scripts/deployment-runner.mjs|scripts/configure-deployment-sidecar.mjs)
                  add_target runner
                  ;;
                infra/docker/compose.yml)
                  add_target platform
                  add_target runner
                  ;;
              esac
              case "${file}" in
                core-api.Dockerfile|apps/core-admin/*|services/core-api/*)
                  add_target core
                  ;;
              esac
              case "${file}" in
                exam-api.Dockerfile|apps/exam-admin/*|services/exam-api/*)
                  add_target exam
                  ;;
              esac
              case "${file}" in
                notification-service.Dockerfile|services/notification-service/*)
                  add_target notification
                  ;;
              esac
              case "${file}" in
                campus-service.Dockerfile|services/campus-service/*)
                  add_target campus
                  ;;
              esac
              case "${file}" in
                iot-service.Dockerfile|services/iot-service/*)
                  add_target iot
                  ;;
              esac
              case "${file}" in
                infra/docker/mongodb.Dockerfile|infra/docker/mongodb-entrypoint.sh|infra/docker/mongo-init.sh|infra/docker/ensure-users.js)
                  add_target mongodb
                  ;;
              esac
              case "${file}" in
                packages/platform-auth/*)
                  add_target platform
                  add_target core
                  add_target exam
                  add_target campus
                  add_target iot
                  ;;
              esac
            done < changed-files.txt
          fi

          valid_targets=(platform core exam notification backup runner campus iot mongodb)
          for target in "${targets[@]}"; do
            valid=false
            for known in "${valid_targets[@]}"; do
              if [ "${known}" = "${target}" ]; then
                valid=true
                break
              fi
            done
            if [ "${valid}" = false ]; then
              echo "Unknown target: ${target}" >&2
              exit 1
            fi
          done

          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No image targets resolved; nothing to build."
            echo "targets=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          resolved="$(IFS=,; echo "${targets[*]}")"
          release_targets=()
          for target in "${targets[@]}"; do
            [ "${target}" = "runner" ] || release_targets+=("${target}")
          done
          release_resolved="$(IFS=,; echo "${release_targets[*]}")"
          echo "Resolved targets: ${resolved}"
          echo "targets=${resolved}" >> "${GITHUB_OUTPUT}"
          echo "release_targets=${release_resolved}" >> "${GITHUB_OUTPUT}"

      - name: Synchronize build start with release center
        if: steps.resolve.outputs.release_targets != ''
        continue-on-error: true
        env:
          RELEASE_CALLBACK_URL: ${{ vars.PLATFORM_RELEASE_CALLBACK_URL }}
          RELEASE_CALLBACK_ALLOWED_ORIGIN: ${{ vars.PLATFORM_RELEASE_CALLBACK_ORIGIN }}
          RELEASE_CALLBACK_TOKEN: ${{ secrets.PLATFORM_RELEASE_CALLBACK_TOKEN }}
          RELEASE_ID: ${{ github.event.inputs.release_id || format('gha-{0}-{1}', github.run_id, github.run_attempt) }}
          RELEASE_STATUS: building
          RELEASE_TARGETS: ${{ steps.resolve.outputs.release_targets }}
          RELEASE_REVISION: ${{ github.sha }}
        run: node scripts/release-workflow-callback.mjs

      - name: Check ACR secrets
        if: steps.resolve.outputs.targets != ''
        env:
          ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ACR_USERNAME}" ] || [ -z "${ACR_PASSWORD}" ]; then
            echo "ALIYUN_ACR_USERNAME and ALIYUN_ACR_PASSWORD repository secrets are required." >&2
            exit 1
          fi

      - name: Sign in to Aliyun Container Registry
        if: steps.resolve.outputs.targets != ''
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push selected images
        if: steps.resolve.outputs.targets != ''
        env:
          RAW_TARGETS: ${{ steps.resolve.outputs.targets }}
          PUSH_SHA_TAGS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_sha_tags || 'true' }}
        run: |
          set -euo pipefail
          if [ "${PUSH_SHA_TAGS}" != "true" ]; then
            echo "Immutable SHA tags are mandatory for production candidates." >&2
            exit 1
          fi

          declare -A dockerfiles=(
            [platform]="Dockerfile"
            [core]="core-api.Dockerfile"
            [exam]="exam-api.Dockerfile"
            [notification]="notification-service.Dockerfile"
            [backup]="backup-runner.Dockerfile"
            [runner]="deployment-runner.Dockerfile"
            [campus]="campus-service.Dockerfile"
            [iot]="iot-service.Dockerfile"
            [mongodb]="infra/docker/mongodb.Dockerfile"
          )
          declare -A contexts=(
            [platform]="."
            [core]="."
            [exam]="."
            [notification]="."
            [backup]="."
            [runner]="."
            [campus]="."
            [iot]="."
            [mongodb]="infra/docker"
          )
          declare -A tags=(
            [platform]="platform-api-latest"
            [core]="core-api-latest"
            [exam]="exam-api-latest"
            [notification]="notification-service-latest"
            [backup]="backup-runner-latest"
            [runner]="deployment-runner-latest"
            [campus]="campus-service-latest"
            [iot]="iot-service-latest"
            [mongodb]="mongodb-7.0"
          )

          normalize_target() {
            printf '%s' "$1" | tr '[:upper:]' '[:lower:]' | xargs
          }

          targets=()
          IFS=',' read -ra requested <<< "${RAW_TARGETS}"
          for item in "${requested[@]}"; do
            target="$(normalize_target "${item}")"
            [ -z "${target}" ] && continue
            if [ "${target}" = "all" ]; then
              targets=(platform core exam notification backup runner campus iot mongodb)
              break
            fi
            case "${target}" in
              platform-api) target="platform" ;;
              core-api) target="core" ;;
              exam-api) target="exam" ;;
              notification-service) target="notification" ;;
              backup-runner) target="backup" ;;
              deployment-runner) target="runner" ;;
              campus-service) target="campus" ;;
              iot-service) target="iot" ;;
              mongo) target="mongodb" ;;
            esac
            if [ -z "${dockerfiles[$target]+x}" ]; then
              echo "Unknown target: ${target}" >&2
              exit 1
            fi
            targets+=("${target}")
          done

          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No valid targets selected." >&2
            exit 1
          fi

          unique_targets=()
          for target in "${targets[@]}"; do
            duplicate=false
            for selected in "${unique_targets[@]}"; do
              if [ "${selected}" = "${target}" ]; then
                duplicate=true
                break
              fi
            done
            if [ "${duplicate}" = false ]; then
              unique_targets+=("${target}")
            fi
          done

          short_sha="${GITHUB_SHA::12}"
          build_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          : > release-artifacts.tsv
          for target in "${unique_targets[@]}"; do
            image_tag="${tags[$target]}"
            image="${ACR_IMAGE}:${image_tag}"
            candidate="${ACR_IMAGE}:${image_tag}-${short_sha}"
            metadata_file="build-metadata-${target}.json"

            echo "::group::Build candidate ${target} -> ${candidate}"
            docker buildx build \
              --platform linux/amd64 \
              --file "${dockerfiles[$target]}" \
              --build-arg "BUILD_REVISION=${GITHUB_SHA}" \
              --build-arg "BUILD_TIMESTAMP=${build_timestamp}" \
              --tag "${candidate}" \
              --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
              --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
              --metadata-file "${metadata_file}" \
              --push \
              "${contexts[$target]}"
            digest="$(node scripts/buildx-metadata.mjs "${metadata_file}")"
            rm -f "${metadata_file}"
            reference="${ACR_IMAGE}@${digest}"
            if [ "${target}" != "runner" ]; then
              printf '%s\t%s\t%s\t%s\t%s\n' "${target}" "${image}" "${digest}" "${reference}" "${candidate}" >> release-artifacts.tsv
            fi
            echo "::endgroup::"
          done

      - name: Create exact-candidate smoke environment
        if: steps.resolve.outputs.targets != ''
        env:
          RAW_TARGETS: ${{ steps.resolve.outputs.targets }}
        run: |
          set -euo pipefail
          node scripts/create-ci-env.mjs .env.release-smoke
          sed -i "s|^PLATFORM_RELEASE_ALLOWED_IMAGE_REPOSITORY=.*|PLATFORM_RELEASE_ALLOWED_IMAGE_REPOSITORY=${ACR_IMAGE}|" .env.release-smoke
          declare -A tags=(
            [platform]="platform-api-latest"
            [core]="core-api-latest"
            [exam]="exam-api-latest"
            [notification]="notification-service-latest"
            [backup]="backup-runner-latest"
            [runner]="deployment-runner-latest"
            [campus]="campus-service-latest"
            [iot]="iot-service-latest"
            [mongodb]="mongodb-7.0"
          )
          declare -A env_keys=(
            [platform]="PLATFORM_API_IMAGE"
            [core]="CORE_API_IMAGE"
            [exam]="EXAM_API_IMAGE"
            [notification]="NOTIFICATION_SERVICE_IMAGE"
            [backup]="BACKUP_RUNNER_IMAGE"
            [runner]="DEPLOYMENT_RUNNER_IMAGE"
            [campus]="CAMPUS_SERVICE_IMAGE"
            [iot]="IOT_SERVICE_IMAGE"
            [mongodb]="MONGODB_IMAGE"
          )
          short_sha="${GITHUB_SHA::12}"
          for target in platform core exam notification backup runner campus iot mongodb; do
            suffix="${tags[$target]}"
            if printf ',%s,' "${RAW_TARGETS}" | grep -q ",${target},"; then
              suffix="${suffix}-${short_sha}"
            fi
            sed -i "s|^${env_keys[$target]}=.*|${env_keys[$target]}=${ACR_IMAGE}:${suffix}|" .env.release-smoke
          done

      - name: Smoke test exact candidate images
        if: steps.resolve.outputs.targets != ''
        run: |
          set -euo pipefail
          compose=(docker compose --env-file .env.release-smoke -f infra/docker/compose.yml -f infra/docker/compose.ci.yml)

          pull_with_retry() {
            local attempt=1
            local max_attempts=3
            local delay_seconds=15
            local status=0
            until "${compose[@]}" pull; do
              status=$?
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "docker compose pull failed after ${attempt} attempt(s)." >&2
                return "${status}"
              fi
              echo "docker compose pull failed on attempt ${attempt}/${max_attempts}; retrying in ${delay_seconds}s..." >&2
              sleep "${delay_seconds}"
              attempt=$((attempt + 1))
              delay_seconds=$((delay_seconds * 2))
            done
          }

          pull_with_retry
          "${compose[@]}" up -d --no-build --wait --wait-timeout 240
          node --env-file=.env.release-smoke scripts/verify-platform-smoke.mjs

      - name: Show exact-candidate logs on failure
        if: failure() && steps.resolve.outputs.targets != ''
        run: |
          compose=(docker compose --env-file .env.release-smoke -f infra/docker/compose.yml -f infra/docker/compose.ci.yml)
          "${compose[@]}" ps --all
          "${compose[@]}" logs --no-color
          for container in $("${compose[@]}" ps --all --quiet); do
            name="$(docker inspect --format '{{.Name}}' "${container}" | sed 's#^/##')"
            status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}not-configured{{end}}' "${container}")"
            echo "::group::Health history: ${name} (${status})"
            docker inspect --format '{{if .State.Health}}{{range .State.Health.Log}}{{.End}} exit={{.ExitCode}} {{printf "%s" .Output}}{{println}}{{end}}{{end}}' "${container}"
            echo "::endgroup::"
          done

      - name: Stop exact-candidate smoke stack
        if: always() && steps.resolve.outputs.targets != ''
        run: docker compose --env-file .env.release-smoke -f infra/docker/compose.yml -f infra/docker/compose.ci.yml down -v || true

      - name: Promote verified candidates to deployment tags
        if: steps.resolve.outputs.targets != ''
        env:
          RAW_TARGETS: ${{ steps.resolve.outputs.targets }}
        run: |
          set -euo pipefail
          declare -A tags=(
            [platform]="platform-api-latest"
            [core]="core-api-latest"
            [exam]="exam-api-latest"
            [notification]="notification-service-latest"
            [backup]="backup-runner-latest"
            [runner]="deployment-runner-latest"
            [campus]="campus-service-latest"
            [iot]="iot-service-latest"
            [mongodb]="mongodb-7.0"
          )
          short_sha="${GITHUB_SHA::12}"
          IFS=',' read -ra targets <<< "${RAW_TARGETS}"
          for target in "${targets[@]}"; do
            candidate="${ACR_IMAGE}:${tags[$target]}-${short_sha}"
            deployment_tag="${ACR_IMAGE}:${tags[$target]}"
            docker buildx imagetools create --tag "${deployment_tag}" "${candidate}"
          done

      - name: Synchronize final build result with release center
        if: always() && steps.resolve.outputs.release_targets != ''
        continue-on-error: true
        env:
          RELEASE_CALLBACK_URL: ${{ vars.PLATFORM_RELEASE_CALLBACK_URL }}
          RELEASE_CALLBACK_ALLOWED_ORIGIN: ${{ vars.PLATFORM_RELEASE_CALLBACK_ORIGIN }}
          RELEASE_CALLBACK_TOKEN: ${{ secrets.PLATFORM_RELEASE_CALLBACK_TOKEN }}
          RELEASE_ID: ${{ github.event.inputs.release_id || format('gha-{0}-{1}', github.run_id, github.run_attempt) }}
          RELEASE_STATUS: ${{ job.status }}
          RELEASE_TARGETS: ${{ steps.resolve.outputs.release_targets }}
          RELEASE_REVISION: ${{ github.sha }}
          RELEASE_ARTIFACTS_FILE: release-artifacts.tsv
        run: node scripts/release-workflow-callback.mjs
