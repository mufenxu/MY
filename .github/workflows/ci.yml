name: CI and container images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/admin-console/package-lock.json
            apps/official-website/package-lock.json
            apps/core-admin/package-lock.json
            apps/exam-admin/package-lock.json
            apps/exam-miniapp/package-lock.json
            apps/smart-campus-miniapp/miniprogram/package-lock.json
            services/platform-api/package-lock.json
            services/core-api/package-lock.json
            services/exam-api/package-lock.json
            services/campus-service/package-lock.json
            services/iot-service/package-lock.json
            services/notification-service/package-lock.json

      - name: Install workspace dependencies
        run: npm run install:ci

      - name: Run workspace checks
        run: npm run check

      - name: Audit production dependencies
        run: npm run audit:prod

  repository-security:
    name: Repository security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Scan dependencies, secrets and configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4

  container-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [quality, repository-security, codeql, docker-smoke]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: platform-api
            context: .
            file: Dockerfile
          - image: core-api
            context: .
            file: core-api.Dockerfile
          - image: exam-api
            context: .
            file: exam-api.Dockerfile
          - image: notification-service
            context: .
            file: notification-service.Dockerfile
          - image: backup-runner
            context: .
            file: backup-runner.Dockerfile
          - image: deployment-runner
            context: .
            file: deployment-runner.Dockerfile
          - image: campus-service
            context: .
            file: campus-service.Dockerfile
          - image: iot-service
            context: .
            file: iot-service.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Sign in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/my-${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [quality, repository-security, codeql]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Create ephemeral environment
        run: node scripts/create-ci-env.mjs .env.ci

      - name: Validate ephemeral secrets
        run: node scripts/validate-deployment-env.mjs .env.ci

      - name: Build the complete stack
        run: docker compose --env-file .env.ci -f infra/docker/compose.yml -f infra/docker/compose.ci.yml build

      - name: Start and wait for readiness
        run: docker compose --env-file .env.ci -f infra/docker/compose.yml -f infra/docker/compose.ci.yml up -d --wait --wait-timeout 240

      - name: Verify platform readiness
        run: >-
          curl --fail --retry 10 --retry-delay 3 --header 'X-Forwarded-Proto: https'
          http://127.0.0.1:22100/api/readyz

      - name: Verify official website
        run: >-
          curl --fail --retry 10 --retry-delay 3 --header 'X-Forwarded-Proto: https'
          http://127.0.0.1:22100/

      - name: Verify IoT broker subscription readiness
        run: >-
          curl --fail --retry 10 --retry-delay 3 --header 'X-Forwarded-Proto: https'
          http://127.0.0.1:22100/api/iot/api/ready

      - name: Verify platform session and metrics
        run: node --env-file=.env.ci scripts/verify-platform-smoke.mjs

      - name: Verify MongoDB isolation
        run: node --env-file=.env.ci scripts/verify-mongodb-isolation.mjs .env.ci

      - name: Show container logs on failure
        if: failure()
        run: |
          compose=(docker compose --env-file .env.ci -f infra/docker/compose.yml -f infra/docker/compose.ci.yml)
          "${compose[@]}" ps --all
          for container in $("${compose[@]}" ps --all --quiet); do
            name="$(docker inspect --format '{{.Name}}' "${container}" | sed 's#^/##')"
            service="$(docker inspect --format '{{ index .Config.Labels "com.docker.compose.service" }}' "${container}")"
            state="$(docker inspect --format '{{.State.Status}}' "${container}")"
            status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}not-configured{{end}}' "${container}")"
            if [[ "${state}" != "running" || "${status}" == "unhealthy" ]]; then
              echo "::group::Recent logs: ${name} (${state}/${status})"
              "${compose[@]}" logs --no-color --tail=200 "${service}" || true
              echo "::endgroup::"
            fi
            echo "::group::Health history: ${name} (${status})"
            docker inspect --format '{{if .State.Health}}{{range .State.Health.Log}}{{.End}} exit={{.ExitCode}} {{printf "%s" .Output}}{{println}}{{end}}{{end}}' "${container}"
            echo "::endgroup::"
          done

      - name: Stop the stack
        if: always()
        run: docker compose --env-file .env.ci -f infra/docker/compose.yml -f infra/docker/compose.ci.yml down -v
