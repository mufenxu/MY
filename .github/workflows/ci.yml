name: CI and container images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/admin-console/package-lock.json
            apps/core-admin/package-lock.json
            apps/exam-admin/package-lock.json
            services/platform-api/package-lock.json
            services/core-api/package-lock.json
            services/exam-api/package-lock.json
            services/campus-service/package-lock.json
            services/iot-service/package-lock.json

      - name: Install workspace dependencies
        run: npm run install:ci

      - name: Run workspace checks
        run: npm run check

  container-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: platform-api
            context: .
            file: Dockerfile
          - image: campus-service
            context: services/campus-service
            file: services/campus-service/Dockerfile
          - image: iot-service
            context: services/iot-service
            file: services/iot-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sign in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/my-${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true
