name: CI and container images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/admin-console/package-lock.json
            apps/core-admin/package-lock.json
            apps/exam-admin/package-lock.json
            apps/exam-miniapp/package-lock.json
            apps/smart-campus-miniapp/miniprogram/package-lock.json
            services/platform-api/package-lock.json
            services/core-api/package-lock.json
            services/exam-api/package-lock.json
            services/campus-service/package-lock.json
            services/iot-service/package-lock.json
            services/notification-service/package-lock.json

      - name: Install workspace dependencies
        run: npm run install:ci

      - name: Run workspace checks
        run: npm run check

      - name: Audit production dependencies
        run: npm run audit:prod

  repository-security:
    name: Repository security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Scan dependencies, secrets and configuration
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  container-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [quality, repository-security, codeql, docker-smoke]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: platform-api
            context: .
            file: Dockerfile
          - image: campus-service
            context: services/campus-service
            file: services/campus-service/Dockerfile
          - image: iot-service
            context: services/iot-service
            file: services/iot-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sign in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/my-${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [quality, repository-security, codeql]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create ephemeral environment
        run: node scripts/create-ci-env.mjs .env.ci

      - name: Build the complete stack
        run: docker compose --env-file .env.ci -f infra/docker/compose.yml build

      - name: Start and wait for readiness
        run: docker compose --env-file .env.ci -f infra/docker/compose.yml up -d --wait --wait-timeout 240

      - name: Verify platform readiness
        run: curl --fail --retry 10 --retry-delay 3 http://127.0.0.1:22100/api/readyz

      - name: Verify platform session and metrics
        run: node --env-file=.env.ci scripts/verify-platform-smoke.mjs

      - name: Verify MongoDB isolation
        run: node --env-file=.env.ci scripts/verify-mongodb-isolation.mjs .env.ci

      - name: Show container logs on failure
        if: failure()
        run: docker compose --env-file .env.ci -f infra/docker/compose.yml logs --no-color

      - name: Stop the stack
        if: always()
        run: docker compose --env-file .env.ci -f infra/docker/compose.yml down -v
