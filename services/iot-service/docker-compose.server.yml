services:
  mqttapi:
    image: mufenxu/mqttapi:latest
    container_name: mqttapi
    restart: unless-stopped
    ports:
      - "4066:4066"
    environment:
      TZ: Asia/Shanghai
      DATA_DIR: /app/data
      API_PORT: 4066
      LOG_HTTP_REQUESTS: ${LOG_HTTP_REQUESTS:-1}
      TRUST_PROXY: ${TRUST_PROXY:-0}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-}
      MQTT_URL: ${MQTT_URL:-mqtt://localhost:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: node_api_client
      AUTH_ENABLED: "false"
      AUTH_USERNAME: admin
      AUTH_PASSWORD: ""
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
    volumes:
      - mqttapi_data:/app/data

volumes:
  mqttapi_data:
